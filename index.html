<!DOCTYPE html>
<html>
<head>
    <title>Othello Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="content">
        <h1>Othello</h1>

        <h2 id="turnText">Current Turn: Black</h2>
        <!-- Displays whose turn it is. 
             The ID allows JavaScript to update this text dynamically during gameplay. -->

        <h3 id="scoreText">Black: 2 | White: 2</h3>
        <!-- Displays the current score. 
             Also updated dynamically by JavaScript using the ID. -->

        <div id="board"></div>
        <!-- Empty container where the game board will be generated by JavaScript.
             The script will fill this with 64 tiles (8x8 grid). -->

        <button onclick="resetGame()">Play Again</button>
        <!-- Button that calls the resetGame() function in script.js to restart the match -->

    </div>

    <!-- Game Over Modal -->
    <!-- This modal appears when the game ends to show the winner and offer a replay option -->
    <div id="gameOverModal" class="modal">
    <!-- The 'modal' class is styled to overlay the screen and dim the background. -->
        <div class="modal-content">
            <h2 id="winnerText"></h2>
            <!-- JavaScript fills this with whoever won-->
            <button onclick="resetGame()">Play Again</button>
            <!-- Button inside the modal to restart the game -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
